<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML Banner Export</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    >
    <link rel="stylesheet" href="ui.css">
  </head>
  <body class="bg-body">
    <main class="container-fluid py-3 d-grid gap-3 layout">
      <header class="d-grid gap-1">
        <h1 class="h5 mb-0">HTML Banner Export</h1>
        <p class="text-secondary mb-0">Export selected Figma frames as GAM-ready ZIPs.</p>
      </header>

      <section class="card">
        <details class="video-disclosure">
          <summary class="video-summary">
            <h2 class="section-title text-uppercase text-secondary mb-0">Video URLs (Optional)</h2>
          </summary>

          <div class="video-content d-grid gap-3">
            <p class="text-secondary mb-0">Provide an MP4 URL for each selected size where video is used.</p>

            <fieldset class="video-group" data-video-size="970x250" hidden>
              <legend>970x250</legend>
              <div>
                <label for="video-970x250-url" class="form-label mb-1">Video URL</label>
                <input
                  id="video-970x250-url"
                  class="form-control form-control-sm"
                  type="url"
                  placeholder="https://cdn.example.com/video-970x250.mp4"
                >
              </div>
            </fieldset>

            <fieldset class="video-group" data-video-size="1024x400" hidden>
              <legend>1024x400</legend>
              <div>
                <label for="video-1024x400-url" class="form-label mb-1">Video URL</label>
                <input
                  id="video-1024x400-url"
                  class="form-control form-control-sm"
                  type="url"
                  placeholder="https://cdn.example.com/video-1024x400.mp4"
                >
              </div>
            </fieldset>

            <fieldset class="video-group" data-video-size="300x600" hidden>
              <legend>300x600</legend>
              <div>
                <label for="video-300x600-url" class="form-label mb-1">Video URL</label>
                <input
                  id="video-300x600-url"
                  class="form-control form-control-sm"
                  type="url"
                  placeholder="https://cdn.example.com/video-300x600.mp4"
                >
              </div>
            </fieldset>

            <fieldset class="video-group">
              <legend>MPU 300x250</legend>
              <div>
                <label for="video-300x250-url" class="form-label mb-1">Video URL</label>
                <input
                  id="video-300x250-url"
                  class="form-control form-control-sm"
                  type="url"
                  placeholder="https://cdn.example.com/video-300x250.mp4"
                >
              </div>
            </fieldset>

            <fieldset class="video-group">
              <legend>Leaderboard 728x90</legend>
              <div>
                <label for="video-728x90-url" class="form-label mb-1">Video URL</label>
                <input
                  id="video-728x90-url"
                  class="form-control form-control-sm"
                  type="url"
                  placeholder="https://cdn.example.com/video-728x90.mp4"
                >
              </div>
            </fieldset>

            <fieldset class="video-group">
              <legend>App 320x50</legend>
              <div>
                <label for="video-320x50-url" class="form-label mb-1">Video URL</label>
                <input
                  id="video-320x50-url"
                  class="form-control form-control-sm"
                  type="url"
                  placeholder="https://cdn.example.com/video-320x50.mp4"
                >
              </div>
            </fieldset>

            <fieldset class="video-group">
              <legend>Mobile 300x50</legend>
              <div>
                <label for="video-300x50-url" class="form-label mb-1">Video URL</label>
                <input
                  id="video-300x50-url"
                  class="form-control form-control-sm"
                  type="url"
                  placeholder="https://cdn.example.com/video-300x50.mp4"
                >
              </div>
            </fieldset>
          </div>
        </details>
      </section>

      <section class="card">
        <div class="card-body d-grid gap-2">
          <h2 class="section-title text-uppercase text-secondary">Selection</h2>
          <ul id="selection-list" class="list-group list-panel"></ul>
        </div>
      </section>

      <section class="card">
        <div class="card-body d-grid gap-2">
          <h2 class="section-title text-uppercase text-secondary">Results</h2>
          <ul id="result-list" class="list-group list-panel"></ul>
        </div>
      </section>

      <div id="status" class="alert alert-secondary mb-0" role="status">Loading UI…</div>
      <button id="export-btn" class="btn btn-primary btn-sm fw-semibold w-100" type="button">Export ZIPs</button>
    </main>

    <script>
      (() => {
        const status = document.getElementById('status');
        if (status) {
          status.textContent = 'Loading UI script...';
        }

        try {
          parent.postMessage(
            {
              pluginMessage: {
                type: 'debug-log',
                payload: { message: 'ui-inline-loaded' },
              },
            },
            '*',
          );
        } catch (error) {
          console.log('[HTML Banner Export][ui-inline] postMessage failed', error);
        }
      })();
    </script>
    <script src="ui.js"></script>
  </body>
</html>
